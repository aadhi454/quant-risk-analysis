<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>
  <script>
    if (localStorage.getItem("auth") !== "true") {
      window.location.href = "login.html";
    }
  </script>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="brand">Quant Risk</div>
      <p onclick="go('dashboard.html')">Dashboard</p>
      <p onclick="go('portfolio.html')">Portfolio</p>
      <p onclick="go('settings.html')">Settings</p>
    </aside>
    <main class="main">
      <div class="topbar">
        <div>
          <h1 class="title">Portfolio</h1>
          <p class="subtitle">Scenario-weighted portfolio summary</p>
        </div>
      </div>

      <div class="panel">
        <h4>Weights</h4>
        <div class="form-row">
          <input class="weight-input" id="w1" type="number" step="0.01" value="0.40" min="0" max="1">
          <input class="weight-input" id="w2" type="number" step="0.01" value="0.30" min="0" max="1">
          <input class="weight-input" id="w3" type="number" step="0.01" value="0.30" min="0" max="1">
          <button class="btn" id="portfolio-calc">Calculate</button>
        </div>
      </div>

      <div class="panel">
        <h4>Portfolio Metrics</h4>
        <div id="portfolio-metrics" class="metric-grid"></div>
      </div>
    </main>
  </div>
</body>
</html>
