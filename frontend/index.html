<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MONTRA - Quantitative Intelligence</title>
  <style>
    /* --- MASTER STYLES --- */
    body { 
        margin: 0; 
        overflow: hidden; 
        background-color: #050505; /* Deeper, richer black */
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    }
    
    canvas { 
        display: block; 
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
    }

    /* --- SLEEK INSTITUTIONAL TICKER --- */
    .ticker-tape {
        position: absolute;
        top: 0;
        width: 100%;
        background: rgba(10, 10, 10, 0.85);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(5px);
        color: #94a3b8;
        font-family: 'Courier New', Courier, monospace;
        font-size: 0.85rem;
        padding: 8px 0;
        z-index: 20;
        overflow: hidden;
        white-space: nowrap;
    }

    .ticker-content {
        display: inline-block;
        animation: scrollTicker 40s linear infinite;
    }

    .ticker-item {
        margin-right: 50px;
        letter-spacing: 1px;
    }

    .ticker-symbol { color: #f8fafc; font-weight: bold; margin-right: 5px; }
    .up { color: #10b981; } /* Muted, professional green */
    .down { color: #ef4444; }

    @keyframes scrollTicker {
        0% { transform: translateX(100vw); }
        100% { transform: translateX(-100%); }
    }
    
    /* --- MATURE GLASSMORPHISM UI --- */
    .ui-layer { 
        position: absolute; 
        top: 50%; 
        left: 50%; 
        transform: translate(-50%, -50%); 
        text-align: center; 
        z-index: 10;
        background: rgba(15, 15, 20, 0.4);
        padding: 50px 70px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px; /* Sharper corners for a pro look */
        backdrop-filter: blur(20px);
        box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }
    
    h1 { 
        font-size: 3.5rem; 
        color: #ffffff; 
        margin: 0; 
        letter-spacing: 12px; 
        font-weight: 300; /* Thinner font weight for elegance */
        text-shadow: 0 0 30px rgba(255, 255, 255, 0.2); 
    }
    
    p { 
        color: #64748b; 
        font-size: 0.9rem; 
        letter-spacing: 4px; 
        text-transform: uppercase; 
        margin-top: 15px;
        margin-bottom: 40px;
    }
    
    button { 
        padding: 14px 45px; 
        background: transparent; 
        color: #e2e8f0; 
        border: 1px solid #38bdf8; 
        border-radius: 2px; 
        font-size: 0.85rem; 
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer; 
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
    }
    
    button:hover { 
        background: rgba(56, 189, 248, 0.1); 
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        border-color: #7dd3fc;
    }

    /* Vignette overlay to darken the edges of the 3D scene */
    .vignette {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, transparent 40%, #050505 120%);
        z-index: 5;
        pointer-events: none;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div class="ticker-tape">
    <div class="ticker-content">
        <span class="ticker-item"><span class="ticker-symbol">RELIANCE.NS</span> ₹3,024.15 <span class="up">▲ 1.2%</span></span>
        <span class="ticker-item"><span class="ticker-symbol">TCS.NS</span> ₹4,115.80 <span class="down">▼ 0.4%</span></span>
        <span class="ticker-item"><span class="ticker-symbol">HDFCBANK.NS</span> ₹1,449.41 <span class="up">▲ 0.8%</span></span>
        <span class="ticker-item"><span class="ticker-symbol">INFY.NS</span> ₹1,480.20 <span class="up">▲ 2.1%</span></span>
        <span class="ticker-item"><span class="ticker-symbol">SBIN.NS</span> ₹760.50 <span class="down">▼ 1.1%</span></span>
        <span class="ticker-item"><span class="ticker-symbol">ITC.NS</span> ₹420.30 <span class="up">▲ 0.5%</span></span>
        <span class="ticker-item"><span class="ticker-symbol">WIPRO.NS</span> ₹485.10 <span class="up">▲ 1.4%</span></span>
    </div>
  </div>

  <div class="vignette"></div>

  <div class="ui-layer">
    <h1>MONTRA</h1>
    <p>Quantitative Risk Engine</p>
    <button onclick="window.location.href='login.html'">Initialize Terminal</button>
  </div>

  <script>
    const scene = new THREE.Scene();
    
    // Add subtle fog to fade out the horizon
    scene.fog = new THREE.FogExp2(0x050505, 0.02);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // Create the particle grid (Data Ocean)
    const gridSize = 100;
    const segments = 60;
    const geometry = new THREE.PlaneGeometry(gridSize, gridSize, segments, segments);
    
    // Rotate to lay flat like a floor
    geometry.rotateX(-Math.PI / 2);

    // Using Points instead of lines for a cleaner, high-tech node look
    const material = new THREE.PointsMaterial({ 
        size: 0.15, 
        color: 0x38bdf8, // Subtle institutional blue/cyan
        transparent: true,
        opacity: 0.6,
        blending: THREE.AdditiveBlending
    });
    
    const plane = new THREE.Points(geometry, material);
    scene.add(plane);

    // Position camera low to the ground looking across the "ocean"
    camera.position.set(0, 5, 20);
    camera.lookAt(0, 0, 0);

    const clock = new THREE.Clock();
    let mouseX = 0;
    let mouseY = 0;

    // Very subtle parallax effect with mouse
    document.addEventListener('mousemove', (event) => {
        mouseX = (event.clientX / window.innerWidth) - 0.5;
        mouseY = (event.clientY / window.innerHeight) - 0.5;
    });

    function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime() * 0.5;
        
        // Fluid wave mathematics
        const positions = plane.geometry.attributes.position.array;
        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i];
            const z = positions[i + 2];
            // Combine Sine and Cosine waves for a complex, natural undulating motion
            positions[i + 1] = Math.sin((x + time) * 0.3) * Math.cos((z + time) * 0.2) * 1.5;
        }
        plane.geometry.attributes.position.needsUpdate = true;
        
        // Slow cinematic camera pan and mouse follow
        camera.position.x += (mouseX * 5 - camera.position.x) * 0.02;
        camera.position.y += (-mouseY * 2 + 5 - camera.position.y) * 0.02;
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
